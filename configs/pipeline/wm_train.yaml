# configs/pipeline/wm_train.yaml
defaults:
  - /datamodule: jepa_data
  - /model@model.vqvae: vqvae
  - /model@model.power_net: power_net
  - /model@model.jepa: control_jepa
  - _self_

stage: 2

# Define Stage 2 specific hyperparameters here
lr: 1e-4
max_epochs: 100
num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
msg_embedding_dim: 256
num_embeddings: 256
history_size: 3

model:
  vqvae:
    checkpoint_path:  "" #"${logging_params.ckp_dir}/best_vqvae.pt" # Interpolates the global ckp_dir!

trainer:
  _target_: c3jepa_wm.trainers.world_model.WMTrainer
  epochs: ${pipeline.max_epochs} # Automatically grabs 100
  lr: ${pipeline.lr}             # Automatically grabs 1e-4
  history_size: ${pipeline.history_size} # Automatically grabs 3
  num_preds: 1
  lambda_sigreg: 0.1
  lambda_pow: 0.1
  lambda_value: 0.1
  lambda_quality: 0.1
  lambda_send: 0.1




  