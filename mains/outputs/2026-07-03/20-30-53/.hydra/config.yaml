pipeline:
  datamodule:
    _target_: c3jepa_wm.data.data_module.PlanningDataModule
    batch_size: 3
    max_length: 150
    num_workers: 0
    img_size: ${pipeline.img_size}
  model:
    vqvae:
      _target_: c3jepa_wm.models.msg_net.VQVAE
      in_channels: 3
      embedding_dim: 256
      num_embeddings: 256
      hidden_dims:
      - 64
      - 128
      - 256
      - 512
      - 512
      beta: 1.0
      img_size: 224
      checkpoint_path: ''
    jepa:
      _target_: c3jepa_wm.models.jepa.JEPA
      encoder:
        _target_: stable_pretraining.backbone.utils.vit_hf
        size: tiny
        patch_size: 14
        image_size: ${pipeline.img_size}
        pretrained: false
        use_mask_token: false
      predictor:
        _target_: c3jepa_wm.models.jepa.ARPredictor
        num_frames: ${pipeline.history_size}
        input_dim: ${pipeline.embed_dim}
        hidden_dim: ${pipeline.embed_dim}
        output_dim: ${pipeline.embed_dim}
        depth: 6
        heads: 16
        mlp_dim: 2048
        dim_head: 64
        dropout: 0.1
        emb_dropout: 0.0
        msg_embedding_dim: ${pipeline.msg_embedding_dim}
        num_embeddings: ${pipeline.num_embeddings}
      action_encoder:
        _target_: c3jepa_wm.models.jepa.DiscreteActionEncoder
        num_actions: 4
        action_emb_dim: ${pipeline.embed_dim}
      projector:
        _target_: c3jepa_wm.models.jepa.MLP
        input_dim: ${pipeline.embed_dim}
        output_dim: ${pipeline.embed_dim}
        hidden_dim: 2048
        norm_fn:
          _target_: torch.nn.BatchNorm1d
          _partial_: true
      pred_proj:
        _target_: c3jepa_wm.models.jepa.MLP
        input_dim: ${pipeline.embed_dim}
        output_dim: ${pipeline.embed_dim}
        hidden_dim: 2048
        norm_fn:
          _target_: torch.nn.BatchNorm1d
          _partial_: true
      checkpoint_path: ''
  stage: 3
  lr: 0.0001
  wm_lr: 0.0001
  power_lr: 0.0003
  max_epochs: 100
  num_workers: 6
  train_split: 0.9
  seed: 3072
  img_size: 224
  embed_dim: 192
  msg_embedding_dim: 256
  num_embeddings: 256
  history_size: 3
  evaluator:
    _target_: c3jepa_wm.evaluators.control.MultiAgentGoalEvaluator
    history_size: ${pipeline.history_size}
    goal_offset: 10
    SNR: 10.0
    p_max: 10
    noise_power: 0.001
  planner:
    _target_: c3jepa_wm.planners.mpc.JEPAGoalPlanner
    horizon: ${pipeline.history_size}
    history_size: ${pipeline.history_size}
    action_dim: 4
    pop_size: 300
    topk: 30
    opt_steps: 30
  eval_func:
    _target_: c3jepa_wm.evaluators.control.MultiAgentGoalEvaluator.evaluate_dataset_over_time
exp_params:
  manual_seed: 1234
logging_params:
  project_name: planning_eval
  save_dir: .
  ckp_dir: .
